name: Send scheduled messages

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger send-messages cron
        run: |
          curl -f -X GET "${{ secrets.APP_URL }}/api/cron/send-messages" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
